<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}LIhelper{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark border-bottom border-secondary px-4 py-2">
  <a class="navbar-brand fw-bold" href="/">
    <i class="bi bi-briefcase-fill text-primary me-2"></i>LIhelper
  </a>
  <div class="ms-auto d-flex align-items-center gap-3">
    <span id="nav-stats" class="text-secondary small"></span>
    <a href="/" class="btn btn-sm btn-outline-secondary">Dashboard</a>
  </div>
</nav>

<div class="container-fluid py-4 px-4">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script src="/static/js/kanban.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
